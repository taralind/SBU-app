name: Deploy Shiny App to shinyapps.io

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-22.04 # Locked to 22.04 for stable pre-compiled binaries
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: Setup R dependencies using renv
        uses: r-lib/actions/setup-renv@v2

      - name: Install rsconnect
        run: Rscript -e 'install.packages("rsconnect")'

      - name: Deploy App
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e "
            rsconnect::setAccountInfo(
              name = Sys.getenv('SHINYAPPS_ACCOUNT'),
              token = Sys.getenv('SHINYAPPS_TOKEN'),
              secret = Sys.getenv('SHINYAPPS_SECRET')
            )
            rsconnect::deployApp(
              appName = 'SBU-app', 
              forceUpdate = TRUE
            )
          "
